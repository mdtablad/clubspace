<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Custom Meta Tags -->
    <title>ClubSpace - Settings</title>
    <link rel="icon" type="image/x-icon" href="../public/assets/clubspace-watermark.ico">
    <!-- Link Refs -->
    <link rel="stylesheet" href="../styles/styles.css">
    <link rel="stylesheet" href="../styles/login.css">
    <link rel="stylesheet" href="../styles/settings.css">
    <link rel="stylesheet" href="../styles/dashboard.css">
    <script src="https://kit.fontawesome.com/776f506411.js" crossorigin="anonymous"></script>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>
<body>
    <!-- // Container \\ -->
    <div class="container"> 
        <div class="background"></div>
        <!-- Container Wrapper -->
        <div class="wrap">
            <!-- Sitewide Topbar -->
            <div class="sitewide-topbar"> 
                <div class="sitewide-header"> 
                    <a href="../index.html" class="cs-btn">
                        <h3 class="cs-1"> Club </h3>
                    </a>
                    <a href="../index.html" class="cs-btn">
                        <h3 class="cs-2"> Space </h3>
                    </a>
                </div>
                <div class="sitewide-navigation"> 
                    <a href="../nav/dashboard/clubs.html" class="dashboard-settings-btn pointer">
                        <i class="fa-solid fa-arrow-right-from-bracket fa-xl"></i>
                    </a>
                </div>
            </div>
            <!-- Inner Wrap -->
            <div class="inner-wrap"> 
                <!-- Inner Wrap Content -->
                <div class="inner-wrap-content in-flex"> 
                    <div class="slice-background"> </div>
                    <section class="settings-section"> 
                        <div id="settings-window"> 
                            <div class="settings-top">
                                <div class="settings-top-left">  
                                    <h2 class="settings-header">Settings</h2>
                                    <h4 class="settings-subHeader">User</h4>
                                </div>
                                <div class="settings-top-right"> 
                                    <img src="https://www.waipahuhigh.org/ourpages/auto/2023/5/15/59713595/WHS%20LOGO.png" alt="Settings Icon" class="settings-icon">  
                                </div>
                            </div>
                            <div class="settings-bottom"> 
                                <div class="settings-list"> 
                                    <div class="settings-category"> 
                                        <h3 class="settings-category-header"> General </h3>
                                        <div class="settings-category-list"> 
                                            <div class="settings-option"> 
                                                <div class="settings-option-left">
                                                    <h3 class="settings-option-header">Language</h3>
                                                    <h4 class="settings-option-desc">Change the language of ClubSpace.</h4>
                                                </div>
                                                <div class="settings-option-right">
                                                    <div class="settings-option-selection"> 
                                                        <select name="language" id="language-select" class="settings-option-dropdown">
                                                            <option value="english">English</option>
                                                            <option value="spanish">Spanish</option>
                                                            <option value="filipino">Filipino</option>
                                                        </select>
                                                    </div>
                                                </div>
                                            </div>
                                            <div class="settings-option"> 
                                                <div class="settings-option-left">
                                                    <h3 class="settings-option-header">Email</h3>
                                                    <h4 class="settings-option-desc">Change your email inside ClubSpace.</h4>
                                                </div>
                                                <div class="settings-option-right">
                                                    <div class="settings-option-selection"> 
                                                        <input type="text" class="settings-option-input" name="email" placeholder="Email"> 
                                                    </div>
                                                </div>
                                            </div>
                                            <div class="settings-option"> 
                                                <div class="settings-option-left">
                                                    <h3 class="settings-option-header">Profile Icon</h3>
                                                    <h4 class="settings-option-desc">Change your profile icon inside ClubSpace.</h4>
                                                </div>
                                                <div class="settings-option-right">
                                                    <div class="settings-option-selection-file"> 
                                                        <input type="file" class="settings-option-file" name="icon"> 
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>
                </div>
            </div>
            <!-- Sitewide Footer -->
            <div class="sitewide-footer"> </div>
        </div>
    </div>
</body>
</html>
