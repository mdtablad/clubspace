<!DOCTYPE html>

<body>
    <!-- // Container \\ -->
    <div class="container">

                    </a>
                    <a href="../../index.html" class="cs-btn">

                    </a>
                </div>
                <div class="sitewide-navigation"> 
                    <div class="dashboard-nav-island"> 
                        <a href="../dashboard/clubs.html" class="dni-btn">
                            <div class="dni-button pointer"> My Clubs </div>

                    <div class="dashboard-settings-button">

                        </a>
                    </div>
                </div>
            </div>
            <!-- Inner Wrap -->
            <div class="inner-wrap">

                <div class="inner-wrap-content">

                                </div>
                                
                            </div>

                                <div class="clubs-content-header"> 
                                    <div class="cch-header-join-btn"> 
                                        <i class="fa-solid fa-right-to-bracket cch-header-join-btn-icon"></i>
                                        <a href="../club/view.html" class="cch-header-join-link"> Join Club </a>
                                    </div>
                                </div>
                                <div class="clubs-content-bottom">

                                        <div class="clubs-content-desc"> 
                                            <h3 class="cci-header"> Club Description </h3>
                                            <p class="cci-description"> This is the  description for the club. </p>
                                        </div>

                                    </div>
                                    <div class="club-highlights">

                                            <h4 class="clubs-content-stats-stat"> Owner: John Doe </h4>

                                    </div>
                                </div>
                            </div>
                        </section>
                    </section>
                    <img class="club-page-logo" src="https://www.waipahuhigh.org/ourpages/auto/2023/5/15/59713595/WHS%20LOGO.png">
